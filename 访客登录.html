<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>访客登录(测试)</title>
    <style>
    	/* 小屏幕手机端 */
	@media (min-width: 0px) and (max-width:768px) {
		.div1{
			width: 100px;
			height: 100px;
			background-color: red;
		}
	}
	
	/* 中等屏幕（桌面显示器，大于等于 992px） */
	@media (min-width: 768px) and (max-width:992px){
		.div1{
			width: 300px;
			height: 300px;
			background-color: blue;
		}
	}
	
	/* 大屏幕（大桌面显示器，大于等于 1200px） */
	@media (min-width: 992px) {
		.div1{
			width: 500px;
			height: 500px;
			background-color: aqua;
		}
	}
    </style>
    <link href="./css/访客登录.css" rel="stylesheet">
</head>

<body>
    <div class="from">
        <img class="bgc" src="./img/访客登录1.jpg" alt="">
        <div class="submit">
            <span class="form_title">访客信息提交</span>
            <div class="form_input">
                <span>姓名：</span>
                <input class="inputs" type="text" value="">
            </div>
            <div class="form_input">
                <span>手机号:</span>
                <input class="inputs" type="text" value="">
            </div>
            <div class="form_input">
                <span>邮箱：</span>
                <input class="inputs" type="text" value="">
            </div>
            <div class="btn_submit">
                <a href="./finish.html">
                    <button class="btn">提交</button></a>
                <a href="./index.html" class="back"><button class="home_href">首页</button></a>
            </div>
        </div>
    </div>
</body>
